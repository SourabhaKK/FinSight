name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --dev
      - run: uv run mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: ollama
      GEMINI_API_KEY: dummy
      GEMINI_MODEL: gemini-2.0-flash
      GROQ_API_KEY: dummy
      GROQ_MODEL: llama-3.3-70b-versatile
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.2:3b
      DISTILBERT_MODEL_PATH: artefacts/distilbert_finsight.pt
      BASELINE_MODEL_PATH: artefacts/baseline_pipeline.joblib
      URGENCY_MODEL_PATH: artefacts/urgency_pipeline.joblib
      LOG_LEVEL: INFO
      MAX_TEXT_LENGTH: "10000"
      MIN_TEXT_LENGTH: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --dev
      - run: >
          uv run pytest tests/ -v
          -m "not slow and not benchmark"
          --tb=short -x

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t finsight .
